<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập thực hành.</title>
</head>
<body>
    <script>
        let orders = ["Đơn hàng 1", "Đơn hàng 2", "Đơn hàng 3","Đơn hàng 4","Đơn hàng 5"];
        console.log("Danh sách đơn hàng:", orders);

        let revenues = [1500, 2800, 1200, -500, 3200];
        let totalRevenue = revenues.reduce((total, revenue) => total + revenue, 0);

        let ordersRevenues = {};
        orders.forEach((order, index) => {
            ordersRevenues[order] = revenues[index];
        });
        console.log(ordersRevenues);
        
        let balance = revenues.filter(revenue => revenue > 0).reduce((total, revenue) => total + revenue, 0);

        let results = orders.map((order, index) => {
            return {
                order: order,
                revenue: revenues[index]
            };
        });
        console.log(results);
        results = results.map(result => `${result.order} mang về ${result.revenue}USD`);
        console.log(results);
    </script>
</body>
</html>
